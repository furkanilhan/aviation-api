services:
  postgres:
    image: postgres:15
    container_name: aviation-postgres
    environment:
      POSTGRES_DB: aviationdb
      POSTGRES_USER: aviation
      POSTGRES_PASSWORD: aviation123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aviation-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
