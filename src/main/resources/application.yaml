app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 1 gün (ms)

spring:
  application:
    name: aviation-api

  datasource:
    url: jdbc:postgresql://localhost:5432/aviationdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

server:
  port: 8080

logging:
  level:
    com.aviation: DEBUG
    org.springframework: ERROR
    org.hibernate: ERROR